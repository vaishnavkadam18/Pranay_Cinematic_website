<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Now - Pranay Creation</title>

<style>
body {
    background: black;
    color: white;
    font-family: 'Poppins', sans-serif;
}

/* FORM */
.contact {
    padding: 60px 20px;
    text-align: center;
}

.contact-form {
    max-width: 400px;
    margin: auto;
    padding: 25px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    backdrop-filter: blur(10px);
}

/* INPUT */
.input-box {
    margin-bottom: 15px;
}

.input-box input,
.input-box select {
    width: 100%;
    padding: 12px;
    background: #111;
    border: 1px solid #444;
    color: white;
    border-radius: 8px;
    outline: none;
}

/* ERROR */
.error {
    color: red;
    font-size: 12px;
    text-align: left;
    display: block;
    margin-top: 5px;
}

/* BUTTON */
.btn-book {
    width: 100%;
    padding: 12px;
    background: rgb(201, 175, 32);
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: black;
    border: 1px solid rgb(209, 187, 64);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}
input[type="date"] {
    color: white;
    background: #111;
}

/* Calendar icon color fix (Chrome) */
input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
}
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("camera1.jpg") no-repeat center center/cover;
    filter: brightness(40%);
    z-index: -1;
}
</style>

</head>

<body>

<section class="contact">

<h2 style="color: rgb(235, 235, 70);">Book Your Shoot</h2>
<h5>Please fill all required fields correctly.</h5>

<form id="bookingForm" class="contact-form">

<div class="input-box">
    <input type="text" id="name" placeholder="Your Name" required>
    <small class="error"></small>
</div>

<div class="input-box">
    <input type="tel" id="phone" placeholder="Phone Number" required maxlength="10">
    <small class="error"></small>
</div>

<div class="input-box">
    <input type="text" id="location" placeholder="Location" required>
    <small class="error"></small>
</div>

<div class="input-box">
    <input type="date" id="date" required>
    <small class="error"></small>
</div>

<div class="input-box">
    <select id="package" required>
        <option value="">Select Service</option>
        <option value="Wedding Shoot">Wedding Shoot</option>
        <option value="Pre-Wedding">Pre-Wedding</option>
        <option value="Photography">Photography</option>
        <option value="Other">Others</option>
    </select>
    <small class="error"></small>
</div>

<div class="input-box">
    <input type="text" id="details" placeholder="Details">
    <small class="error"></small>
</div>

<button type="submit" class="btn-book">Send Booking</button>

</form>

</section>

<!-- POPUP -->
<div id="popup" class="popup"></div>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e){
    e.preventDefault();

    let valid = true;

    let name = document.getElementById("name");
    let phone = document.getElementById("phone");
    let location = document.getElementById("location");
    let date = document.getElementById("date");
    let pack = document.getElementById("package");
    let details = document.getElementById("details");

    document.querySelectorAll(".error").forEach(el => el.innerText = "");

    function showError(input, message){
        input.parentElement.querySelector(".error").innerText = message;
    }

    if(name.value.trim() === ""){
        showError(name, "Name required");
        valid = false;
    }

    if(!/^[0-9]{10}$/.test(phone.value)){
        showError(phone, "Enter valid 10-digit number");
        valid = false;
    }

    if(location.value.trim() === ""){
        showError(location, "Location required");
        valid = false;
    }

    if(date.value === ""){
        showError(date, "Select date");
        valid = false;
    }

    if(pack.value === ""){
        showError(pack, "Select service");
        valid = false;
    }

    if(valid){

    let popup = document.getElementById("popup");

    popup.innerHTML = `
        <h2 style="color:gold;">✅ Booking Successful!</h2>
        <p>Thank you for choosing Pranay Creation 🎬</p>
        <p>We will contact you soon.</p>
        <button onclick="closePopup()" style="
            margin-top:10px;
            padding:8px 15px;
            background:gold;
            border:none;
            border-radius:20px;
            cursor:pointer;">
            OK
        </button>
    `;

    popup.style.display = "block";

    // OPTIONAL: try opening WhatsApp (safe way)
    let message = encodeURIComponent(
`Hello Pranay Creation,
Name: ${name.value}
Phone: ${phone.value}
Location: ${location.value}
Date: ${date.value}
Service: ${pack.value}
Details: ${details.value || "Not provided"}`
    );

    let url = `https://wa.me/917666078515?text=${message}`;

    setTimeout(() => {
        window.open(url, "_blank");
    }, 1500);
}
});

function closePopup(){
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
